<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sanctum Wrapped 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <link rel="stylesheet" href="/static/Wrapped/w-shared.css?v=4">
  <link rel="stylesheet" href="/static/Wrapped/w-hours.css?v=4">
</head>
<body>
<div id="screen-fx"></div>
<div id="progress-bar-row"></div>
<canvas id="spiral-canvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

<div id="combat-ui">
  <div class="hp-bar-container" id="boss-hp-container">
    <div class="hp-label">💀💀 SYSTEM ADMINISTRATOR [ELITE✚✚]</div>
    <div class="hp-fill" id="boss-hp-fill"></div>
    <div class="hp-text" id="boss-hp-text">0 / 15,000</div>
  </div>
  <div id="user-stats-bar"></div>
  <div class="hp-bar-container" id="user-hp-container">
    <div id="user-shield"></div>
    <div class="hp-label" id="hp-user-label">LISTENER</div>
    <div class="hp-fill" id="user-hp-fill"></div>
    <div class="hp-text" id="user-hp-text">0 / 1,500</div>
  </div>
</div>

<canvas id="fireworks-canvas"></canvas>

<div id="slide-content">
  <div class="glass s2-content">
    <div class="s2-label">Your Passive Grind</div>
    <div class="s2-desc">You spent</div>
    <div class="s2-number" id="s-hours-num">0</div>
    <div class="s2-desc">Hours leveling up your listening experience!</div>
    <div class="s2-combat-text" id="s-hours-combat-text">Your relentless focus strikes the boss!</div>
  </div>
</div>

<div id="tap-cue">tap anywhere to continue →</div>

<script src="/static/Wrapped/w-shared.js?v=4"></script>
<script src="/static/Wrapped/w-hours.js?v=4"></script>
</body>
</html>
