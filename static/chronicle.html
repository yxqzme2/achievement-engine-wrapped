<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronicle of Conquest</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/chronicle.css?v=1">
</head>
<body>

<nav class="nav-bar">
    <a href="/" class="nav-title">The Listener's Sanctum</a>
    <div>
        <a href="/journal">Journal</a>
        <a href="/champions">Leaderboard</a>
        <a href="/roster">Roster</a>
        <a href="/timeline">Timeline</a>
        <a href="/chronicle" class="active">Chronicle</a>
        <a href="/archives">Stats</a>
        <a href="/playlist">Playlist</a>
        <a href="/tier">Tier List</a>
        <a href="/loot">Loot</a>
        <a href="/quests">Quests</a>
        <a href="/radar">Radar</a>
        <a href="/request">Request</a>
    </div>
</nav>

<div class="chronicle-page">

    <div class="page-header">
        <div class="header-eyebrow">System Archive</div>
        <h1>CHRONICLE OF CONQUEST</h1>
        <p class="header-sub">Every world explored. Every campaign completed. The permanent record.</p>
    </div>

    <div id="user-tabs" class="user-tabs">
        <div class="loader-inline">Summoning records…</div>
    </div>

    <div id="stats-banner" class="stats-banner" style="display:none"></div>

    <div class="controls-row" id="controls-row" style="display:none">
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all"        onclick="setFilter('all',this)">All Entries</button>
            <button class="filter-btn"         data-filter="campaigns"  onclick="setFilter('campaigns',this)">Campaigns</button>
            <button class="filter-btn"         data-filter="books"      onclick="setFilter('books',this)">Books</button>
        </div>
        <div id="year-filters" class="year-group"></div>
    </div>

    <div id="chronicle-feed" class="chronicle-feed">
        <div class="loader">Consulting the archives…</div>
    </div>

</div>

<script src="/static/chronicle.js?v=1"></script>
</body>
</html>
