name: Publish Docker images to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

jobs:
  build-achievement-engine:
    name: Build and push achievement-engine image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push achievement-engine
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/yxqzme2/achievement-engine-wrapped:latest

  build-abs-stats:
    name: Build and push abs-stats image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push abs-stats
        uses: docker/build-push-action@v5
        with:
          context: ./abs-stats
          push: true
          tags: ghcr.io/yxqzme2/abs-stats:latest
