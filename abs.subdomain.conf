## abs.laruenet.com -> achievement engine
## Version 2026/02/24

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name abs.*;

    include /config/nginx/ssl.conf;
    client_max_body_size 0;

    # Redirect root to landing page
    location = / {
        return 301 /landing;
    }

    # -----------------------------
    # Achievement Engine — page routes
    # -----------------------------

    location ~ ^/(landing|journal|champions|timeline|archives|tier|playlist|forge|roster|character|wrapped|system-alert|loot|system|quests|radar|request|admin)(/.*)?$ {
        include /config/nginx/proxy.conf;
        proxy_pass http://10.10.10.125:8000;
    }

    # Legacy /awards/* routes (backward compat)
    location = /awards {
        return 301 /awards/;
    }

    location ^~ /awards/ {
        include /config/nginx/proxy.conf;
        proxy_pass http://10.10.10.125:8000;
    }

    # Achievement Engine API
    location ^~ /api/ {
        include /config/nginx/proxy.conf;
        proxy_pass http://10.10.10.125:8000;
    }

    # Static assets (CSS, JS, shared libraries)
    location ^~ /static/ {
        include /config/nginx/proxy.conf;
        proxy_pass http://10.10.10.125:8000;
    }

    # Icons
    location ^~ /icons/ {
        include /config/nginx/proxy.conf;
        proxy_pass http://10.10.10.125:8000;
    }

    # -----------------------------
    # GT500 (static, unrelated to achievement engine)
    # -----------------------------

    location = /GT500 {
        return 301 /GT500/;
    }

    location ^~ /GT500/ {
        alias /gt500/;
        index index.html;
        try_files $uri $uri/ /GT500/index.html;
    }
}
